<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Racing Gauntlet - Hybrid Mode</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; user-select: none; background: #b0e0e6; }
        #lobby-menu {
            position: absolute; width: 100%; height: 100%; background: rgba(20, 30, 48, 0.9);
            color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        #pause-menu {
            position: absolute; width: 100%; height: 100%; background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 90;
        }
        .lobby-panel { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 12px; text-align: center; max-width: 400px; width: 85%; }
        input, button, select { padding: 12px; margin: 8px 0; width: 100%; box-sizing: border-box; border-radius: 6px; border: none; font-size: 16px; }
        button { background: #00ffcc; color: #141e30; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #00ccaa; }
        select { background: #303f9f; color: white; cursor: pointer; flex-grow: 1; }
        
        .color-picker-container { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
        #color-preview { width: 38px; height: 38px; border-radius: 50%; background-color: #ff00aa; border: 2px solid white; flex-shrink: 0; transition: background-color 0.2s; }
        
        #game-hud {
            position: absolute; top: 20px; left: 20px; color: white; font-size: 16px; font-weight: bold;
            font-family: monospace; background: rgba(0,0,0,0.5); padding: 12px 18px; border-radius: 5px; z-index: 5; display: none;
        }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border-radius: 50%; background: white; transform: translate(-50%, -50%); pointer-events: none; z-index: 5; display: none; }
        #notification {
            position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%);
            color: #00ffcc; font-size: 36px; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,204,0.8);
            background: rgba(0,0,0,0.8); padding: 15px 35px; border-radius: 8px; display: none; z-index: 6; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="lobby-menu">
        <div class="lobby-panel">
            <h2>3D Parkour Gauntlet</h2>
            <button id="btn-solo" style="background: #ff5722; color: white; margin-bottom: 15px;">Play Single Player</button>
            <p style="opacity: 0.5; margin: 5px 0;">— OR MULTIPLAYER —</p>
            <input type="text" id="username-input" placeholder="Enter Your Nickname" value="Player">
            
            <label style="font-size: 12px; opacity: 0.7; display: block; text-align: left; margin-top: 5px;">Sway Suit Color:</label>
            <div class="color-picker-container">
                <div id="color-preview"></div>
                <select id="color-input">
                    <option value="#ff00aa">Hot Pink</option>
                    <option value="#00ffcc">Neon Cyan</option>
                    <option value="#ffca28">Gold Yellow</option>
                    <option value="#9c27b0">Royal Purple</option>
                    <option value="#e53935">Crimson Red</option>
                </select>
            </div>

            <hr style="opacity: 0.1; margin: 10px 0;">
            <button id="btn-create">Create Multiplayer Room</button>
            <input type="text" id="room-input" placeholder="Enter 6-Letter Code">
            <button id="btn-join" style="background: #26c6da;">Join Room</button>
            
            <div id="lobby-wait" style="display:none; margin-top:20px;">
                <h3 style="color:#00ffcc;">Room Key: <span id="display-key">------</span></h3>
                <p id="player-count">Waiting for players...</p>
                <button id="btn-start" style="background:#ffca28; display:none;">Start Race!</button>
            </div>
        </div>
    </div>

    <div id="pause-menu">
        <div class="lobby-panel">
            <h2>Game Paused</h2>
            <p style="opacity: 0.7; margin-bottom: 20px;">Single player mode is currently paused.</p>
            <button id="btn-resume">Resume Run</button>
            <button id="btn-quit" style="background: #e53935; color: white; margin-top: 10px;">Quit to Menu</button>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="game-hud">Mode: Single Player | Checkpoint: Start</div>
    <div id="notification">GO!</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let ws = null; 
        let myId = null, myRoomId = null, myName = "Player", myColor = "#ff00aa";
        let isMultiplayer = false;
        let isRacing = false;
        let isPaused = false;
        let remotePlayers = {}; 

        connectWebSocket();

        function connectWebSocket() {
            // Automatically switch between ws:// (local) and wss:// (Render/HTTPS)
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const serverUrl = protocol + '//' + window.location.host;
            
            ws = new WebSocket(serverUrl);
            ws.onmessage = handleNetworkMessage;
            ws.onerror = () => console.log("Running in offline server sandbox state.");
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xb0e0e6);
        scene.fog = new THREE.FogExp2(0xb0e0e6, 0.005);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(30, 60, 10);
        scene.add(sunLight);

        let platforms = [];
        let spawnPlatformMesh = null;
        let fireworkSystems = [];

        function generateLocalSeeds() {
            const seeds = [];
            let lastX = 0, lastY = 0, lastZ = -12;
            let lastDepth = 25;
            const TOTAL_PLATFORMS = 19;

            for (let i = 1; i <= TOTAL_PLATFORMS; i++) {
                let t = (i - 1) / (TOTAL_PLATFORMS - 1);
                let w = 6.0 - (t * 4.2);
                let h = Math.random() * 4 + 4;
                let d = 6.0 - (t * 4.2);
                
                let minGap = 9.8 + (t * 4.0);
                let maxGap = 11.2 + (t * 4.5);
                let gapZ = -(Math.random() * (maxGap - minGap) + minGap);
                
                let verticalRange = 1.2 + (t * 1.6);
                let nextY = lastY + (Math.random() * (verticalRange * 2) - verticalRange);
                let nextZ = lastZ + (lastDepth / 2) + gapZ - (d / 2);
                
                let maxSway = 3.0 + (t * 4.8);
                let nextX = lastX + (Math.random() * (maxSway * 2) - maxSway);

                let isChk = (i === 5 || i === 10 || i === 15);

                seeds.push({ w, h, d, x: nextX, y: nextY, z: nextZ, isChk, index: i });
                lastX = nextX; lastY = nextY; lastZ = nextZ; lastDepth = d;
            }
            seeds.push({ w: 4, h: 4, d: 4, x: lastX + (Math.random()*2-1), y: lastY + 0.5, z: lastZ - 15.0, isGoal: true });
            return seeds;
        }

        function buildMapFromSeeds(seeds) {
            platforms.forEach(p => scene.remove(p));
            if (spawnPlatformMesh) { scene.remove(spawnPlatformMesh); spawnPlatformMesh = null; }
            platforms = [];

            const startGeo = new THREE.BoxGeometry(25, 2, 25);
            const startMat = new THREE.MeshStandardMaterial({ color: 0x8bc34a, roughness: 0.7 });
            spawnPlatformMesh = new THREE.Mesh(startGeo, startMat);
            spawnPlatformMesh.position.set(0, -1, 0);
            scene.add(spawnPlatformMesh);
            spawnPlatformMesh.geometry.computeBoundingBox();
            platforms.push(spawnPlatformMesh);

            const colors = [0xff7043, 0x26a69a, 0xffca28, 0xab47bc, 0x26c6da];

            seeds.forEach(s => {
                const geo = new THREE.BoxGeometry(s.w, s.h, s.d);
                let col = s.isGoal ? 0x2e7d32 : (s.isChk ? 0x607d8b : colors[s.index % colors.length]);
                const mat = new THREE.MeshStandardMaterial({ color: col, roughness: 0.7 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(s.x, s.y, s.z);
                
                mesh.userData = { isCheckpoint: s.isChk, isGoal: s.isGoal, chkName: `Platform ${s.index}` };
                scene.add(mesh);
                mesh.geometry.computeBoundingBox();
                platforms.push(mesh);
            });
        }

        function createMinecraftModel(name, hexColor) {
            const group = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: new THREE.Color(hexColor), roughness: 0.6 });

            const chestGeo = new THREE.BoxGeometry(0.9, 0.75, 0.45);
            const chest = new THREE.Mesh(chestGeo, bodyMat);
            chest.position.y = 0.95;
            group.add(chest);

            const headCanvas = document.createElement('canvas');
            headCanvas.width = 128; headCanvas.height = 128;
            const headCtx = headCanvas.getContext('2d');
            headCtx.fillStyle = hexColor;
            headCtx.fillRect(0, 0, 128, 128);
            headCtx.fillStyle = '#ffffff'; headCtx.fillRect(20, 55, 30, 20);
            headCtx.fillStyle = '#111111'; headCtx.fillRect(35, 55, 15, 20);
            headCtx.fillStyle = '#ffffff'; headCtx.fillRect(78, 55, 30, 20);
            headCtx.fillStyle = '#111111'; headCtx.fillRect(78, 55, 15, 20);

            const headTexture = new THREE.CanvasTexture(headCanvas);
            const headMaterials = [
                bodyMat, bodyMat, bodyMat, bodyMat,
                new THREE.MeshStandardMaterial({ map: headTexture, roughness: 0.6 }),
                bodyMat
            ];

            const headGeo = new THREE.BoxGeometry(0.45, 0.45, 0.45);
            const head = new THREE.Mesh(headGeo, headMaterials);
            head.position.y = 1.55;
            group.add(head);

            const noseGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
            const nose = new THREE.Mesh(noseGeo, new THREE.MeshStandardMaterial({ color: 0x222222 }));
            nose.position.set(0, 1.48, -0.25);
            group.add(nose);

            const limbGeo = new THREE.BoxGeometry(0.22, 0.75, 0.22);
            const lArm = new THREE.Mesh(limbGeo, bodyMat); lArm.position.set(-0.58, 0.95, 0); group.add(lArm);
            const rArm = new THREE.Mesh(limbGeo, bodyMat); rArm.position.set(0.58, 0.95, 0); group.add(rArm);
            const lLeg = new THREE.Mesh(limbGeo, bodyMat); lLeg.position.set(-0.25, 0.38, 0); group.add(lLeg);
            const rLeg = new THREE.Mesh(limbGeo, bodyMat); rLeg.position.set(0.25, 0.38, 0); group.add(rLeg);

            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(0, 0, 256, 64);
            ctx.font = 'bold 28px monospace';
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.fillText(name, 128, 42);

            const textTex = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: textTex, transparent: true });
            const nameSprite = new THREE.Sprite(spriteMat);
            nameSprite.position.set(0, 2.1, 0);
            nameSprite.scale.set(2, 0.5, 1);
            group.add(nameSprite);

            return group;
        }

        function createFirework(pos) {
            const particleCount = 60;
            const geometry = new THREE.BufferGeometry();
            const positions = []; const velocities = []; const colors = [];
            const palette = [new THREE.Color(0xff0055), new THREE.Color(0x00ffcc), new THREE.Color(0xffcc00)];
            const chosenCol = palette[Math.floor(Math.random() * palette.length)];

            for(let i=0; i<particleCount; i++) {
                positions.push(pos.x, pos.y + 2, pos.z);
                velocities.push((Math.random() - 0.5) * 0.3, (Math.random() * 0.3) + 0.1, (Math.random() - 0.5) * 0.3);
                colors.push(chosenCol.r, chosenCol.g, chosenCol.b);
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({ size: 0.4, vertexColors: true, transparent: true, opacity: 1 });
            const pSystem = new THREE.Points(geometry, material);
            scene.add(pSystem);
            fireworkSystems.push({ system: pSystem, vels: velocities, life: 1.0 });
        }

        function updateFireworks() {
            for(let i = fireworkSystems.length - 1; i >= 0; i--) {
                const fw = fireworkSystems[i]; fw.life -= 0.015;
                fw.system.material.opacity = fw.life;
                const posArr = fw.system.geometry.attributes.position.array;
                for(let j=0; j<posArr.length/3; j++) {
                    posArr[j*3] += fw.vels[j*3]; posArr[j*3+1] += fw.vels[j*3+1]; fw.vels[j*3+1] -= 0.005; posArr[j*3+2] += fw.vels[j*3+2];
                }
                fw.system.geometry.attributes.position.needsUpdate = true;
                if(fw.life <= 0) { scene.remove(fw.system); fireworkSystems.splice(i, 1); }
            }
        }

        const menu = document.getElementById('lobby-menu');
        const pauseMenu = document.getElementById('pause-menu');
        const nameInput = document.getElementById('username-input');
        const colorInput = document.getElementById('color-input');
        const colorPreview = document.getElementById('color-preview');
        const roomInput = document.getElementById('room-input');
        const waitPanel = document.getElementById('lobby-wait');
        const keyDisplay = document.getElementById('display-key');
        const pCount = document.getElementById('player-count');
        const startBtn = document.getElementById('btn-start');

        colorPreview.style.backgroundColor = colorInput.value;
        colorInput.addEventListener('change', (e) => {
            colorPreview.style.backgroundColor = e.target.value;
            myColor = e.target.value;
        });

        document.getElementById('btn-solo').addEventListener('click', () => {
            isMultiplayer = false;
            menu.style.display = "none";
            pauseMenu.style.display = "none";
            document.getElementById('crosshair').style.display = "block";
            document.getElementById('game-hud').style.display = "block";
            document.getElementById('game-hud').innerText = `Mode: Offline Solo | Checkpoint: Start`;
            
            nameInput.disabled = true; colorInput.disabled = true;

            currentCheckpointPos.set(0, 1.8, 6); 
            buildMapFromSeeds(generateLocalSeeds());
            resetPlayerPosition();
            flashNotice("GAME STARTED!", "#ffca28");
            isRacing = true;
            isPaused = false;
            document.body.requestPointerLock();
        });

        document.getElementById('btn-resume').addEventListener('click', () => {
            document.body.requestPointerLock();
        });

        document.getElementById('btn-quit').addEventListener('click', () => {
            isRacing = false;
            isPaused = false;
            pauseMenu.style.display = "none";
            menu.style.display = "flex";
            document.getElementById('crosshair').style.display = "none";
            document.getElementById('game-hud').style.display = "none";
            
            nameInput.disabled = false; colorInput.disabled = false;
            
            platforms.forEach(p => scene.remove(p));
            if (spawnPlatformMesh) { scene.remove(spawnPlatformMesh); spawnPlatformMesh = null; }
            Object.keys(remotePlayers).forEach(k => { scene.remove(remotePlayers[k]); delete remotePlayers[k]; });
            remotePlayers = {};
        });

        document.getElementById('btn-create').addEventListener('click', () => {
            if(ws.readyState !== 1) { alert("Server is offline. Try Single Player Mode!"); return; }
            myName = nameInput.value.trim() || "Player";
            myColor = colorInput.value;
            isMultiplayer = true;
            ws.send(JSON.stringify({ type: 'create_room', name: myName, color: myColor }));
            startBtn.style.display = "block";
        });

        document.getElementById('btn-join').addEventListener('click', () => {
            if(ws.readyState !== 1) { alert("Server is offline. Try Single Player Mode!"); return; }
            myName = nameInput.value.trim() || "Player";
            myColor = colorInput.value;
            isMultiplayer = true;
            if(roomInput.value.trim().length === 6) {
                ws.send(JSON.stringify({ type: 'join_room', roomId: roomInput.value.trim().toUpperCase(), name: myName, color: myColor }));
            } else {
                alert("Please enter a valid 6-letter room key.");
            }
        });

        startBtn.addEventListener('click', () => {
            if(isMultiplayer) ws.send(JSON.stringify({ type: 'start_race' }));
        });

        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === document.body) {
                if (!isMultiplayer && isPaused) {
                    isPaused = false;
                    pauseMenu.style.display = "none";
                }
            } else {
                if (isRacing && !isMultiplayer) {
                    isPaused = true;
                    pauseMenu.style.display = "flex";
                    moveForward = moveBackward = moveLeft = moveRight = false;
                }
            }
        });

        function handleNetworkMessage(event) {
            const msg = JSON.parse(event.data);
            switch(msg.type) {
                case 'error':
                    alert(msg.message);
                    isMultiplayer = false;
                    break;
                case 'room_created':
                case 'room_joined':
                    myId = msg.playerId; myRoomId = msg.roomId;
                    keyDisplay.innerText = myRoomId; waitPanel.style.display = "block";
                    buildMapFromSeeds(msg.seeds);
                    document.getElementById('game-hud').innerText = `Room: ${myRoomId} | Checkpoint: Start`;
                    nameInput.disabled = true; colorInput.disabled = true;
                    break;
                case 'player_list':
                    pCount.innerText = `Players In Lobby: ${Object.keys(msg.players).length}`;
                    break;
                case 'race_started':
                    menu.style.display = "none";
                    document.getElementById('crosshair').style.display = "block";
                    document.getElementById('game-hud').style.display = "block";
                    flashNotice("RACE STARTED!", "#00ffcc");
                    currentCheckpointPos.set(0, 1.8, 6);
                    resetPlayerPosition();
                    isRacing = true;
                    document.body.requestPointerLock();
                    break;
                case 'player_moved':
                    if (msg.playerId === myId) return;
                    if (!remotePlayers[msg.playerId]) {
                        remotePlayers[msg.playerId] = createMinecraftModel(msg.playerData.name, msg.playerData.color || '#ff00aa');
                        scene.add(remotePlayers[msg.playerId]);
                    }
                    remotePlayers[msg.playerId].position.set(msg.playerData.x, msg.playerData.y - 1.8, msg.playerData.z);
                    remotePlayers[msg.playerId].rotation.y = msg.playerData.yaw;
                    break;
                case 'player_disconnected':
                    if (remotePlayers[msg.playerId]) { scene.remove(remotePlayers[msg.playerId]); delete remotePlayers[msg.playerId]; }
                    break;
                case 'race_won':
                    triggerVictorySequence(msg.winnerName);
                    break;
            }
        }

        function triggerVictorySequence(winnerName) {
            isRacing = false;
            document.exitPointerLock();
            
            let upperName = winnerName.toUpperCase();
            let announcement = (upperName === "YOU" || upperName === myName.toUpperCase()) ? "YOU WIN!" : `${upperName} WINS!`;
            flashNotice(announcement, "#ffca28");
            
            const goalPlatform = platforms[platforms.length - 1];
            if (goalPlatform) {
                for(let f=0; f<8; f++) {
                    setTimeout(() => createFirework(goalPlatform.position), f * 400);
                }
            }
            setTimeout(() => { 
                menu.style.display = "flex"; 
                waitPanel.style.display = "none";
                startBtn.style.display = "none";
                nameInput.disabled = false; colorInput.disabled = false;
                Object.keys(remotePlayers).forEach(k => { scene.remove(remotePlayers[k]); delete remotePlayers[k]; });
                remotePlayers = {};
            }, 5000);
        }

        function flashNotice(txt, col) {
            const box = document.getElementById('notification');
            box.innerText = txt; box.style.color = col; box.style.display = "block";
            setTimeout(() => box.style.display = "none", 4000);
        }

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        const player = {
            height: 1.8, velocity: new THREE.Vector3(), inputDirection: new THREE.Vector3(),
            box: new THREE.Box3(new THREE.Vector3(), new THREE.Vector3()),
            acceleration: 0.024, maxSpeed: 0.24, friction: 0.86, airControl: 0.35,
            timeLeftGround: 0, coyoteDuration: 150
        };

        let yaw = 0, pitch = 0;
        let currentCheckpointPos = new THREE.Vector3(0, 1.8, 6);

        function resetPlayerPosition() {
            camera.position.copy(currentCheckpointPos);
            player.velocity.set(0, 0, 0); yaw = 0; pitch = 0; camera.rotation.set(0, 0, 0);
            moveForward = moveBackward = moveLeft = moveRight = false; 
        }

        document.addEventListener('keydown', (e) => {
            if(!isRacing || isPaused) return;
            switch (e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space': 
                    if (canJump || (performance.now() - player.timeLeftGround < player.coyoteDuration)) { 
                        player.velocity.y = 0.34; canJump = false; player.timeLeftGround = 0; 
                    } 
                    break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch (e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement !== document.body || !isRacing || isPaused) return;
            yaw -= e.movementX * 0.002; pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch)); 
            camera.rotation.x = pitch; camera.rotation.y = yaw;
        });

        let lastSocketUpdate = 0;

        function updatePhysics() {
            if(!isRacing) {
                player.velocity.set(0, 0, 0);
                return;
            }
            if(isPaused) return; 

            player.velocity.y -= 0.011;

            const frontVec = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            const sideVec = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
            
            player.inputDirection.set(0, 0, 0);
            if (moveForward) player.inputDirection.add(frontVec);
            if (moveBackward) player.inputDirection.sub(frontVec);
            if (moveLeft) player.inputDirection.sub(sideVec);
            if (moveRight) player.inputDirection.add(sideVec);
            player.inputDirection.normalize();

            const accelRate = canJump ? player.acceleration : player.acceleration * player.airControl;
            if (player.inputDirection.lengthSq() > 0) {
                player.velocity.x += player.inputDirection.x * accelRate;
                player.velocity.z += player.inputDirection.z * accelRate;
            }
            player.velocity.x *= canJump ? player.friction : 0.98;
            player.velocity.z *= canJump ? player.friction : 0.98;

            const speed = Math.sqrt(player.velocity.x * player.velocity.x + player.velocity.z * player.velocity.z);
            if (speed > player.maxSpeed) {
                player.velocity.x = (player.velocity.x / speed) * player.maxSpeed;
                player.velocity.z = (player.velocity.z / speed) * player.maxSpeed;
            }

            camera.position.x += player.velocity.x; camera.position.z += player.velocity.z; camera.position.y += player.velocity.y;
            if (camera.position.y < -30) resetPlayerPosition();

            player.box.setFromCenterAndSize(new THREE.Vector3(camera.position.x, camera.position.y - player.height/2, camera.position.z), new THREE.Vector3(1.1, player.height, 1.1));
            const wasGrounded = canJump; canJump = false;

            for (let platform of platforms) {
                let pBox = new THREE.Box3().setFromObject(platform);
                if (player.box.intersectsBox(pBox)) {
                    if (camera.position.y - player.height >= pBox.max.y - 0.6 && player.velocity.y <= 0) {
                        camera.position.y = pBox.max.y + player.height; player.velocity.y = 0; canJump = true;

                        if (platform.userData.isCheckpoint && currentCheckpointPos.z !== platform.position.z) {
                            currentCheckpointPos.set(platform.position.x, pBox.max.y + player.height, platform.position.z);
                            let prefix = isMultiplayer ? `Room: ${myRoomId}` : "Mode: Solo";
                            document.getElementById('game-hud').innerText = `${prefix} | Checkpoint: ${platform.userData.chkName}`;
                        }

                        if (platform.userData.isGoal) {
                            if (isMultiplayer) {
                                ws.send(JSON.stringify({ type: 'finish_line', name: myName }));
                            } else {
                                triggerVictorySequence("You");
                            }
                            isRacing = false;
                        }
                    } else {
                        camera.position.x -= player.velocity.x * 1.2; camera.position.z -= player.velocity.z * 1.2;
                        player.velocity.x *= -0.2; player.velocity.z *= -0.2;
                    }
                }
            }
            if (wasGrounded && !canJump && player.velocity.y <= 0) player.timeLeftGround = performance.now();

            let now = performance.now();
            if (isMultiplayer && ws.readyState === 1 && (now - lastSocketUpdate > 40)) {
                ws.send(JSON.stringify({ type: 'update_position', x: camera.position.x, y: camera.position.y, z: camera.position.z, yaw: yaw, name: myName, color: myColor }));
                lastSocketUpdate = now;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            updateFireworks();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
